<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Wave Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Admin-specific styles */
    .admin-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 72px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-title {
      font-size: 22px;
      font-weight: 700;
    }
    .back-btn {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--surface3); color: var(--text); }

    /* Login */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-card h2 {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 15px;
      font-family: 'Prompt', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--text-muted); }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 15px;
      font-family: 'Prompt', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      background: rgba(255, 107, 107, 0.08);
      border-radius: var(--radius-sm);
      display: none;
    }
    .success-msg {
      color: #6bffb8;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      background: rgba(107, 255, 184, 0.08);
      border-radius: var(--radius-sm);
      display: none;
    }

    /* Admin Panel */
    .admin-panel { display: none; flex-direction: column; gap: 20px; }
    .admin-panel.visible { display: flex; }

    /* Add song card */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .add-card h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Song list */
    .songs-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .songs-card h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .admin-song-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .admin-song-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      transition: background 0.2s;
    }
    .admin-song-item:hover { background: var(--surface3); }
    .admin-song-img {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface3);
      flex-shrink: 0;
    }
    .admin-song-info { flex: 1; overflow: hidden; }
    .admin-song-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-song-artist {
      font-size: 11px;
      color: var(--text-muted);
    }
    .admin-song-id {
      font-size: 10px;
      color: var(--text-sub);
      font-family: monospace;
    }
    .btn-delete {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Prompt', sans-serif;
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-delete:hover { background: rgba(255, 107, 107, 0.18); }
    .songs-empty {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
    .logout-btn {
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .logout-btn:hover { background: var(--surface2); }
    .song-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="toggle-track">
      <span class="toggle-icon toggle-sun">☀️</span>
      <span class="toggle-icon toggle-moon">🌙</span>
      <span class="toggle-thumb"></span>
    </span>
  </button>

  <div class="admin-wrap">

    <div class="admin-header">
      <h1 class="admin-title">🎵 Admin</h1>
      <a href="/" class="back-btn">← กลับหน้าหลัก</a>
    </div>

    <!-- Login -->
    <div class="login-card" id="loginCard">
      <h2>🔐 เข้าสู่ระบบ</h2>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="inputUser" placeholder="username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="inputPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn-primary" id="loginBtn">เข้าสู่ระบบ</button>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">

      <button class="logout-btn" id="logoutBtn">ออกจากระบบ</button>

      <!-- Add Song -->
      <div class="add-card">
        <h3>➕ เพิ่มเพลงใหม่</h3>
        <div class="form-group">
          <label class="form-label">YouTube URL</label>
          <input type="text" class="form-input" id="inputUrl" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ชื่อเพลง (ไม่บังคับ)</label>
            <input type="text" class="form-input" id="inputTitle" placeholder="ดึงจาก YouTube อัตโนมัติ" />
          </div>
          <div class="form-group">
            <label class="form-label">ศิลปิน (ไม่บังคับ)</label>
            <input type="text" class="form-input" id="inputArtist" placeholder="ศิลปิน" />
          </div>
        </div>
        <div class="error-msg" id="addError"></div>
        <div class="success-msg" id="addSuccess"></div>
        <button class="btn-primary" id="addBtn">เพิ่มเพลง</button>
      </div>

      <!-- Song List -->
      <div class="songs-card">
        <h3>📋 รายการเพลง <span class="song-count" id="songCount"></span></h3>
        <div class="admin-song-list" id="adminSongList">
          <p class="songs-empty">กำลังโหลด...</p>
        </div>
      </div>

    </div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
