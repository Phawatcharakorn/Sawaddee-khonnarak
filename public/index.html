<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave | Profile</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wave" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Keyboard Background -->
  <div class="keys-bg" id="keysBg"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="toggle-track">
      <span class="toggle-icon toggle-sun">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zM4.22 4.22a1 1 0 0 1 1.42 0l.7.71a1 1 0 0 1-1.42 1.41l-.7-.7a1 1 0 0 1 0-1.42zm13.44 13.44a1 1 0 0 1 1.41 0l.71.7a1 1 0 1 1-1.41 1.42l-.71-.71a1 1 0 0 1 0-1.41zM3 11h1a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2zm17 0h1a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2zM4.22 19.78a1 1 0 0 1 0-1.41l.7-.71a1 1 0 1 1 1.42 1.41l-.71.71a1 1 0 0 1-1.41 0zm13.44-13.44a1 1 0 0 1 0-1.42l.71-.7a1 1 0 1 1 1.41 1.41l-.7.71a1 1 0 0 1-1.42 0z"/></svg>
      </span>
      <span class="toggle-icon toggle-moon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </span>
      <span class="toggle-thumb"></span>
    </span>
  </button>

  <main class="container">

    <!-- ── Profile ── -->
    <section class="profile-section">
      <div class="avatar-wrap">
        <img class="avatar-img" id="avatarImg" src="avatar.jpg" alt="Wave"
             onerror="this.style.display='none';document.getElementById('avatarFallback').style.display='flex';" />
        <div class="avatar-fallback" id="avatarFallback" style="display:none">W</div>
      </div>
      <h1 class="name">เวฟ <span class="name-slash">/</span> วิน</h1>
      <p class="fullname">ภวัชรกรณ์ สิงห์เอี่ยม</p>
      <p class="bio">นาโนแมชชีนไงไอ้ลูกชาย</p>
      <div class="tags">
        <span class="tag">KU.83</span>
        <a class="tag tag-link" href="https://www.google.com/maps?q=13.120944492659005,100.91919245256695" target="_blank" rel="noopener">
          📍 KU Sriracha
        </a>
        <span class="tag tag-single">มีแฟน ❤️</span>
      </div>
      <div class="socials">
        <a class="social-btn" href="https://www.instagram.com/potato_ps.ps/" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
          potato_ps.ps
        </a>
      </div>
    </section>

    <!-- ── Birthday Countdown ── -->
    <section class="countdown-section">
      <div class="countdown-card">
        <p class="countdown-label" id="cdLabel">🎂 วันเกิดอีก</p>
        <div class="countdown-grid">
          <div class="cd-unit"><span class="cd-num" id="cd-days">--</span><span class="cd-text">วัน</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-hours">--</span><span class="cd-text">ชม.</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-mins">--</span><span class="cd-text">นาที</span></div>
          <div class="cd-sep">:</div>
          <div class="cd-unit"><span class="cd-num" id="cd-secs">--</span><span class="cd-text">วิ</span></div>
        </div>
      </div>
    </section>

    <!-- ── Stories ── -->
    <section class="stories-section">
      <div class="stories-row">
        <button class="stories-nav stories-prev" id="storiesPrev" aria-label="ก่อนหน้า">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <div class="stories-scroll" id="storiesScroll"></div>
        <button class="stories-nav stories-next" id="storiesNext" aria-label="ถัดไป">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
    </section>

    <!-- ── Music Player ── -->
    <section class="player-section">

      <!-- Vinyl Record -->
      <div class="vinyl-wrap">
        <div class="vinyl-outer">
          <div class="vinyl-disc" id="vinyl">
            <div class="vinyl-art" id="vinylArt"></div>
            <div class="vinyl-rings"></div>
          </div>
          <div class="vinyl-hole"></div>
        </div>
      </div>

      <!-- Song Info -->
      <div class="song-info">
        <p class="song-title" id="songTitle">—</p>
        <p class="song-artist" id="songArtist">—</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-wrap">
        <span class="time-label" id="curTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time-label" id="durTime">0:00</span>
      </div>

      <!-- Controls Row 1: Shuffle + Prev + Play + Next + Volume -->
      <div class="controls">
        <button class="ctrl-btn ctrl-shuffle" id="btnShuffle" title="สุ่มเพลง">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-prev" id="btnPrev" title="ก่อนหน้า">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-play" id="btnPlay" title="เล่น/หยุด">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-next" id="btnNext" title="ถัดไป">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-vol" id="btnVol" title="เสียง">
          <svg class="icon-vol-on" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg class="icon-vol-off" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
      </div>

      <!-- Volume Slider -->
      <div class="volume-wrap" id="volumeWrap">
        <div class="volume-inner">
          <svg class="vol-icon-sm" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" />
          <svg class="vol-icon-lg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>
      </div>

      <!-- Playlist -->
      <div class="playlist-wrap">
        <p class="playlist-header">🎵 Playlist</p>
        <ul class="playlist" id="playlist">
          <li class="playlist-loading">กำลังโหลด...</li>
        </ul>
      </div>

    </section>

  </main>

  <!-- Admin Quick-Add FAB -->
  <button class="fab" id="fabAdmin" title="เพิ่มเพลง (Admin)">
    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>

  <!-- Admin Quick-Add Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2>➕ เพิ่มเพลง</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <!-- Step 1: Password -->
      <div id="modalStepPass">
        <div class="form-group-m">
          <label class="form-label-m">Admin Password</label>
          <input type="password" class="form-input-m" id="modalPass" placeholder="••••••••" />
        </div>
        <div class="modal-err" id="modalPassErr"></div>
        <button class="btn-modal" id="modalLoginBtn">ยืนยัน →</button>
      </div>
      <!-- Step 2: Add Song -->
      <div id="modalStepAdd" style="display:none">
        <!-- Search bar -->
        <div class="search-row">
          <input type="text" class="form-input-m" id="modalSearch" placeholder="ค้นหาเพลง เช่น แสตมป์, BNK48..." />
          <button class="btn-search" id="btnSearch">ค้นหา</button>
        </div>
        <!-- Search results -->
        <ul class="search-results" id="searchResults"></ul>
        <!-- Divider -->
        <div class="search-divider"><span>หรือวาง URL โดยตรง</span></div>
        <!-- URL fallback -->
        <div class="form-group-m">
          <input type="text" class="form-input-m" id="modalUrl" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="modal-err" id="modalAddErr"></div>
        <div class="modal-ok"  id="modalAddOk"></div>
        <button class="btn-modal" id="modalAddBtn">เพิ่มจาก URL</button>
        <a href="/admin.html" class="modal-manage-link">จัดการเพลงทั้งหมด →</a>
      </div>
    </div>
  </div>

  <!-- Hidden YouTube IFrame -->
  <div id="yt-player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
